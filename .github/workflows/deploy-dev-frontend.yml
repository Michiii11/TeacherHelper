name: Deploy Dev Frontend

on:
  push:
    branches:
      - dev
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-dev-frontend.yml'

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          cat > frontend/src/environments/version.ts <<'EOF'
          import { Config } from '../app/config';

          export const version = {
            appVersion: Config.APP_VERSION,
            buildVersion: 'dev-${{ github.run_number }}-${GITHUB_SHA::7}',
          };
          EOF

      - name: Overwrite Dockerfile for dev build
        run: |
          cat > frontend/Dockerfile <<'EOF'
          FROM node:20-alpine AS build
          WORKDIR /app

          COPY package*.json ./
          RUN npm ci

          COPY . .

          RUN npm run build -- --configuration=cloud-development

          FROM nginx:alpine
          COPY --from=build /app/dist/frontend/browser /usr/share/nginx/html
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
          EOF

      - name: Debug Angular configuration
        run: |
          echo "=== Dockerfile ==="
          cat frontend/Dockerfile
          echo "=== environment.development.ts exists ==="
          ls -l frontend/src/environments/
          echo "=== angular.json cloud-development ==="
          grep -n "cloud-development" frontend/angular.json || true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: coral-chiller-474405-d9
          workload_identity_provider: projects/346197888787/locations/global/workloadIdentityPools/github/providers/my-repo
          service_account: github-deployer-dev@coral-chiller-474405-d9.iam.gserviceaccount.com

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy frontend
        run: |
          gcloud run deploy teacher-helper-frontend-development \
            --source ./frontend \
            --region europe-west1 \
            --platform managed \
            --allow-unauthenticated \
            --set-build-env-vars CONFIGURATION=cloud-development