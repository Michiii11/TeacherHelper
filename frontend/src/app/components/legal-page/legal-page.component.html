<main class="legal-page">
  <section class="content-card">
    <article class="section-block" *ngFor="let section of content().sections">
      <h2>{{ section.heading }}</h2>

      <p *ngFor="let paragraph of section.paragraphs">
        {{ paragraph }}
      </p>

      <ul *ngIf="section.bullets?.length">
        <li *ngFor="let bullet of section.bullets">
          {{ bullet }}
        </li>
      </ul>
    </article>
  </section>

  <section class="bottom-note">
    <p>{{ 'legalPages.lastUpdated' | translate }} {{ currentYear }}</p>
  </section>
</main>
