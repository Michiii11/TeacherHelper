<main>
  <section>
    <div class="section-header">
      <h2 style="margin-bottom: 16px;">Deine Schulen</h2>
      <button mat-raised-button color="primary" style="margin-bottom: 24px;" (click)="openCreateDialog()">Erstellen</button>
    </div>

    <div class="school-list">
      <mat-card (click)="openSchool(school)" class="school" *ngFor="let school of yourSchools">
        <mat-card-header>
          <mat-card-title>{{school.name}}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p><strong>Admin:</strong> {{school.admin.username}}</p>
          <p><strong>Beispiele:</strong> 0</p>
        </mat-card-content>
      </mat-card>
    </div>
  </section>

  <section>
    <div class="section-header">
      <h2>Andere Schulen</h2>
      <mat-form-field appearance="outline">
        <mat-label>Schule suchen</mat-label>
        <input matInput (input)="filterSchools($event)">
      </mat-form-field>
    </div>

    <div class="school-list">
      <mat-card (click)="openSchool(school)" class="school" *ngFor="let school of otherSchools">
        <mat-card-header>
          <mat-card-title>{{school.name}}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p><strong>Admin:</strong> {{school.admin.username}}</p>
          <p><strong>Beispiele:</strong> 0</p>
        </mat-card-content>
      </mat-card>
    </div>
  </section>

</main>
