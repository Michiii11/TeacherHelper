<mat-card class="auth-card">
  <div class="auth-header">
    <h2>TeacherHelper</h2>
    <p>Anmelden oder neuen Account erstellen</p>
  </div>

  <mat-tab-group [(selectedIndex)]="selectedTab">
    <mat-tab label="Login">
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-form">
        <mat-card-content>
          <mat-form-field subscriptSizing="fixed" appearance="outline" class="full-width">
            <mat-label>E-Mail</mat-label>
            <input matInput formControlName="email" autocomplete="email">
            <mat-error *ngIf="loginForm.get('email')?.invalid">Gültige E-Mail erforderlich</mat-error>
          </mat-form-field>
          <mat-form-field subscriptSizing="fixed" appearance="outline" class="full-width">
            <mat-label>Passwort</mat-label>
            <input matInput type="password" formControlName="password" autocomplete="current-password">
            <mat-error *ngIf="loginForm.get('password')?.invalid">Passwort erforderlich</mat-error>
          </mat-form-field>
          <div *ngIf="loginMessage" class="feedback" [ngClass]="{'error': !loginSuccess, 'success': loginSuccess}">
            {{loginMessage}}
          </div>
          <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid">Login</button>
        </mat-card-content>
        <mat-card-actions>
          <button mat-button color="accent" (click)="onTabChange(1)">Noch kein Account? Registrieren</button>
        </mat-card-actions>
      </form>
    </mat-tab>
    <mat-tab label="Registrieren">
      <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="auth-form">
        <mat-card-content>
          <mat-form-field subscriptSizing="fixed" appearance="outline" class="full-width">
            <mat-label>Benutzername</mat-label>
            <input matInput formControlName="username" autocomplete="username">
            <mat-error *ngIf="registerForm.get('username')?.invalid">Benutzername erforderlich</mat-error>
          </mat-form-field>
          <mat-form-field subscriptSizing="fixed" appearance="outline" class="full-width">
            <mat-label>E-Mail</mat-label>
            <input matInput formControlName="email" autocomplete="email">
            <mat-error *ngIf="registerForm.get('email')?.invalid">Gültige E-Mail erforderlich</mat-error>
          </mat-form-field>
          <mat-form-field subscriptSizing="fixed" appearance="outline" class="full-width">
            <mat-label>Passwort</mat-label>
            <input matInput type="password" formControlName="password" autocomplete="new-password">
            <mat-error *ngIf="registerForm.get('password')?.invalid">Passwort erforderlich</mat-error>
          </mat-form-field>
          <div *ngIf="registerMessage" class="feedback" [ngClass]="{'error': !registerSuccess, 'success': registerSuccess}">
            {{registerMessage}}
          </div>
          <button mat-raised-button color="accent" type="submit" [disabled]="registerForm.invalid">Registrieren</button>
        </mat-card-content>
        <mat-card-actions>
          <button mat-button color="primary" (click)="onTabChange(0)">Bereits Account? Login</button>
        </mat-card-actions>
      </form>
    </mat-tab>
  </mat-tab-group>
</mat-card>
